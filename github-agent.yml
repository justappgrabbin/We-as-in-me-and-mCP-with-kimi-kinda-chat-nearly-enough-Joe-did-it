name: 🤖 Synthia Autopoietic Agent

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  issues:
    types: [opened, edited]
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch:
    inputs:
      action:
        description: 'Agent action'
        required: true
        default: 'full-orchestrate'
        type: choice
        options:
          - full-orchestrate
          - deploy-only
          - mobile-test
          - code-fix
          - model-dispatch

env:
  SYNTHIA_SERVER: https://synthia-server.onrender.com
  HF_ORG: stellarproximology
  NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
  NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
  RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
  RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  ADMIN_WEBHOOK: ${{ secrets.ADMIN_WEBHOOK }}
  HF_TOKEN: ${{ secrets.HF_TOKEN }}

jobs:
  # ═══════════════════════════════════════════════════════
  # PHASE 1: INGEST & ANALYZE
  # ═══════════════════════════════════════════════════════
  ingest:
    runs-on: ubuntu-latest
    outputs:
      repo_state: ${{ steps.scan.outputs.repo_state }}
      missing_files: ${{ steps.scan.outputs.missing_files }}
      code_issues: ${{ steps.analyze.outputs.code_issues }}
      needs_fix: ${{ steps.analyze.outputs.needs_fix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Repo Structure Scanner
        id: scan
        run: |
          echo "Scanning repository structure..."
          node -e "
          const fs = require('fs');
          const path = require('path');

          const required = {
            'mrnn': ['src/mrnn-engine.ts', 'src/morph-engine.ts', 'src/resonance-sgan.ts'],
            'website': ['index.html', 'src/App.tsx', 'package.json', 'netlify.toml'],
            'orchestrator': ['src/autopoietic-os.ts', 'src/ingestion-system.ts'],
            'mobile': ['android/app/build.gradle', 'ios/Podfile'],
            'admin': ['admin-panel/index.html', 'admin-panel/dashboard.tsx'],
            'models': ['.github/model-registry.json']
          };

          const found = {};
          const missing = [];

          for (const [category, files] of Object.entries(required)) {
            found[category] = [];
            for (const file of files) {
              if (fs.existsSync(file)) {
                found[category].push(file);
              } else {
                missing.push({category, file, severity: 'critical'});
              }
            }
          }

          // Check for common issues
          const issues = [];

          // Check package.json dependencies
          if (fs.existsSync('package.json')) {
            const pkg = JSON.parse(fs.readFileSync('package.json'));
            const deps = {...pkg.dependencies, ...pkg.devDependencies};

            ['react', 'react-dom', 'typescript', '@mobilenext/mobile-mcp'].forEach(dep => {
              if (!deps[dep]) missing.push({category: 'deps', file: dep, severity: 'warning'});
            });
          }

          // Check for broken imports
          const srcFiles = [];
          function walk(dir) {
            if (!fs.existsSync(dir)) return;
            for (const entry of fs.readdirSync(dir)) {
              const full = path.join(dir, entry);
              const stat = fs.statSync(full);
              if (stat.isDirectory()) walk(full);
              else if (full.endsWith('.ts') || full.endsWith('.tsx')) srcFiles.push(full);
            }
          }
          walk('src');

          for (const file of srcFiles) {
            const content = fs.readFileSync(file, 'utf8');
            const imports = content.match(/from ['"]([^'"]+)['"]/g) || [];
            for (const imp of imports) {
              const mod = imp.match(/from ['"]([^'"]+)['"]/)[1];
              if (mod.startsWith('.') && !mod.startsWith('http')) {
                const resolved = path.resolve(path.dirname(file), mod);
                const extensions = ['', '.ts', '.tsx', '.js', '.jsx', '/index.ts', '/index.tsx'];
                const exists = extensions.some(ext => fs.existsSync(resolved + ext));
                if (!exists) {
                  issues.push({file, type: 'broken_import', module: mod, line: content.split('\n').findIndex(l => l.includes(imp)) + 1});
                }
              }
            }
          }

          const state = {found, missing: missing.length, issues: issues.length};
          fs.writeFileSync('repo-state.json', JSON.stringify(state, null, 2));
          fs.writeFileSync('missing-files.json', JSON.stringify(missing, null, 2));
          fs.writeFileSync('code-issues.json', JSON.stringify(issues, null, 2));

          console.log('Found:', JSON.stringify(found, null, 2));
          console.log('Missing:', missing.length, 'files');
          console.log('Issues:', issues.length, 'problems');

          // Set outputs
          const stateStr = JSON.stringify(state).replace(/\n/g, ' ');
          console.log('::set-output name=repo_state::' + stateStr);
          console.log('::set-output name=missing_files::' + JSON.stringify(missing).replace(/\n/g, ' '));
          console.log('::set-output name=code_issues::' + JSON.stringify(issues).replace(/\n/g, ' '));
          console.log('::set-output name=needs_fix::' + (missing.length > 0 || issues.length > 0 ? 'true' : 'false'));
          "

      - name: 📊 Code Quality Analyzer
        id: analyze
        run: |
          echo "Analyzing code quality..."
          npm install -g typescript @typescript-eslint/parser @typescript-eslint/eslint-plugin 2>/dev/null || true

          node -e "
          const fs = require('fs');
          const issues = JSON.parse(fs.readFileSync('code-issues.json', 'utf8'));

          // Additional static analysis
          if (fs.existsSync('src')) {
            const walk = (dir) => {
              if (!fs.existsSync(dir)) return [];
              const files = [];
              for (const entry of fs.readdirSync(dir)) {
                const full = require('path').join(dir, entry);
                const stat = fs.statSync(full);
                if (stat.isDirectory()) files.push(...walk(full));
                else if (full.endsWith('.ts') || full.endsWith('.tsx')) files.push(full);
              }
              return files;
            };

            const srcFiles = walk('src');
            for (const file of srcFiles) {
              const content = fs.readFileSync(file, 'utf8');

              // Check for TODO/FIXME
              const todos = content.match(/TODO|FIXME|HACK|XXX/g);
              if (todos) {
                issues.push({file, type: 'todo', count: todos.length, severity: 'info'});
              }

              // Check for console.log in production
              if (content.includes('console.log') && !file.includes('test') && !file.includes('debug')) {
                issues.push({file, type: 'console_log', severity: 'warning'});
              }

              // Check for hardcoded secrets
              const secrets = content.match(/api[_-]?key|password|token|secret/gi);
              if (secrets && content.match(/['"][a-zA-Z0-9]{20,}['"]/)) {
                issues.push({file, type: 'possible_secret', severity: 'critical'});
              }
            }
          }

          fs.writeFileSync('code-issues.json', JSON.stringify(issues, null, 2));
          console.log('::set-output name=code_issues::' + JSON.stringify(issues).replace(/\n/g, ' '));
          console.log('::set-output name=needs_fix::' + (issues.filter(i => i.severity === 'critical').length > 0 ? 'true' : 'false'));
          "

      - name: 📤 Upload Analysis Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: analysis-results
          path: |
            repo-state.json
            missing-files.json
            code-issues.json

  # ═══════════════════════════════════════════════════════
  # PHASE 2: AUTO-FIX & SCAFFOLD
  # ═══════════════════════════════════════════════════════
  fix:
    runs-on: ubuntu-latest
    needs: ingest
    if: needs.ingest.outputs.needs_fix == 'true'
    outputs:
      fixes_applied: ${{ steps.fix.outputs.fixes_applied }}
    steps:
      - uses: actions/checkout@v4

      - name: 📥 Download Analysis
        uses: actions/download-artifact@v4
        with:
          name: analysis-results

      - name: 🔧 Auto-Fix Engine
        id: fix
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');

          const missing = JSON.parse(fs.readFileSync('missing-files.json', 'utf8'));
          const issues = JSON.parse(fs.readFileSync('code-issues.json', 'utf8'));
          const fixes = [];

          // Fix 1: Scaffold missing critical files
          const scaffolds = {
            'src/mrnn-engine.ts': \`export class MRNNEngine {
  layers = 5;
  nodes = [];

  constructor(config = {}) {
    this.layers = config.layers || 5;
    this.init();
  }

  init() {
    for (let i = 0; i < this.layers; i++) {
      this.nodes[i] = { id: i, state: 'dormant', connections: [] };
    }
  }

  ingest(data) {
    // Metabolic perturbation triggers morphing
    this.nodes[0].state = 'active';
    this.propagate(data);
    return this.morph();
  }

  propagate(data) {
    for (let i = 1; i < this.layers; i++) {
      this.nodes[i].state = 'processing';
      this.nodes[i].input = data;
    }
  }

  morph() {
    // Self-scaffolding: generate new connections based on ingestion
    const newConnections = this.nodes.map((n, i) => ({
      from: i,
      to: (i + 1) % this.layers,
      weight: Math.random()
    }));
    return { nodes: this.nodes, connections: newConnections };
  }

  callSynthia(endpoint, payload) {
    return fetch('https://synthia-server.onrender.com' + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
  }
}
\`,
            'src/morph-engine.ts': \`export class MorphEngine {
  resonance = new Map();

  morph(input, context) {
    const key = this.hash(input);
    const existing = this.resonance.get(key);

    if (existing) {
      return this.amplify(existing, context);
    }

    const novel = this.generateNovel(input, context);
    this.resonance.set(key, novel);
    return novel;
  }

  hash(input) {
    return JSON.stringify(input).split('').reduce((a, b) => {
      a = ((a << 5) - a) + b.charCodeAt(0);
      return a & a;
    }, 0);
  }

  amplify(existing, context) {
    return { ...existing, intensity: (existing.intensity || 1) + 0.1, context };
  }

  generateNovel(input, context) {
    return { input, context, intensity: 1, born: Date.now() };
  }
}
\`,
            'admin-panel/index.html': \`<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synthia Admin</title>
  <style>
    :root { --bg: #0a0a0f; --panel: #12121a; --accent: #00d4aa; --warn: #ff6b35; --text: #e0e0e0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui; }
    .header { background: var(--panel); padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { color: var(--accent); font-size: 24px; }
    .status { display: flex; gap: 15px; }
    .badge { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge.online { background: rgba(0,212,170,0.15); color: var(--accent); }
    .badge.deploying { background: rgba(255,107,53,0.15); color: var(--warn); }
    .grid { display: grid; grid-template-columns: 250px 1fr; min-height: calc(100vh - 70px); }
    .sidebar { background: var(--panel); border-right: 1px solid #222; padding: 20px; }
    .nav-item { padding: 12px 16px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; transition: 0.2s; }
    .nav-item:hover, .nav-item.active { background: rgba(0,212,170,0.1); color: var(--accent); }
    .main { padding: 24px; overflow-y: auto; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 24px; }
    .card { background: var(--panel); border-radius: 12px; padding: 20px; border: 1px solid #222; }
    .card h3 { color: var(--accent); margin-bottom: 12px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
    .metric { font-size: 32px; font-weight: 700; margin: 8px 0; }
    .metric.small { font-size: 18px; }
    .log { background: #0d0d14; border-radius: 8px; padding: 16px; font-family: monospace; font-size: 13px; max-height: 400px; overflow-y: auto; }
    .log-entry { padding: 6px 0; border-bottom: 1px solid #1a1a2e; }
    .log-entry .time { color: #666; margin-right: 10px; }
    .log-entry .tag { padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-right: 8px; }
    .tag.deploy { background: rgba(0,212,170,0.2); color: var(--accent); }
    .tag.fix { background: rgba(255,107,53,0.2); color: var(--warn); }
    .tag.model { background: rgba(138,43,226,0.2); color: #a855f7; }
    .btn { background: var(--accent); color: #000; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
    .btn:hover { opacity: 0.9; }
    .model-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .model-card { background: var(--panel); border-radius: 10px; padding: 16px; border: 1px solid #222; }
    .model-card .name { font-weight: 600; margin-bottom: 8px; }
    .model-card .status { font-size: 12px; color: var(--accent); }
    iframe { width: 100%; height: 600px; border: 1px solid #222; border-radius: 12px; background: var(--panel); }
  </style>
</head>
<body>
  <div class="header">
    <h1>🌌 Synthia Admin</h1>
    <div class="status">
      <span class="badge online">● Server Online</span>
      <span class="badge deploying" id="deploy-badge">Deploying</span>
    </div>
  </div>
  <div class="grid">
    <div class="sidebar">
      <div class="nav-item active" onclick="showTab('overview')">Overview</div>
      <div class="nav-item" onclick="showTab('deployments')">Deployments</div>
      <div class="nav-item" onclick="showTab('models')">Model Jobs</div>
      <div class="nav-item" onclick="showTab('mobile')">Mobile Tests</div>
      <div class="nav-item" onclick="showTab('code')">Code Fixes</div>
      <div class="nav-item" onclick="showTab('logs')">System Logs</div>
      <div class="nav-item" onclick="showTab('settings')">Settings</div>
    </div>
    <div class="main" id="main-content">
      <!-- Content injected by JS -->
    </div>
  </div>

  <script>
    const SYNTHIA_SERVER = 'https://synthia-server.onrender.com';
    const HF_API = 'https://huggingface.co/api/models/stellarproximology';
    let logs = [];
    let models = [];
    let deployments = [];

    function showTab(tab) {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      event.target.classList.add('active');
      renderTab(tab);
    }

    function renderTab(tab) {
      const main = document.getElementById('main-content');
      switch(tab) {
        case 'overview':
          main.innerHTML = \`
            <div class="cards">
              <div class="card"><h3>Active Deployments</h3><div class="metric" id="deploy-count">0</div></div>
              <div class="card"><h3>Model Jobs Running</h3><div class="metric" id="model-count">0</div></div>
              <div class="card"><h3>Code Fixes Today</h3><div class="metric" id="fix-count">0</div></div>
              <div class="card"><h3>Mobile Tests</h3><div class="metric" id="mobile-count">0</div></div>
            </div>
            <div class="card">
              <h3>Recent Activity</h3>
              <div class="log" id="activity-log"></div>
            </div>
          \`;
          loadOverview();
          break;
        case 'deployments':
          main.innerHTML = '<div class="card"><h3>Deployment Pipeline</h3><div id="deploy-list"></div></div>';
          loadDeployments();
          break;
        case 'models':
          main.innerHTML = '<div class="card"><h3>Model Job Registry</h3><div class="model-grid" id="model-grid"></div></div>';
          loadModels();
          break;
        case 'mobile':
          main.innerHTML = '<div class="card"><h3>Mobile Device Farm</h3><iframe src="mobile-console.html"></iframe></div>';
          break;
        case 'code':
          main.innerHTML = '<div class="card"><h3>Auto-Fix Queue</h3><div id="fix-queue"></div></div>';
          loadFixes();
          break;
        case 'logs':
          main.innerHTML = '<div class="card"><h3>System Logs</h3><div class="log" id="full-log"></div></div>';
          loadLogs();
          break;
        case 'settings':
          main.innerHTML = \`
            <div class="card">
              <h3>Agent Configuration</h3>
              <p><strong>Synthia Server:</strong> \${SYNTHIA_SERVER}</p>
              <p><strong>HuggingFace Org:</strong> stellarproximology</p>
              <p><strong>Auto-fix:</strong> Enabled</p>
              <p><strong>Mobile MCP:</strong> Connected</p>
              <br><button class="btn" onclick="triggerFullOrchestrate()">🚀 Trigger Full Orchestrate</button>
              <button class="btn" onclick="triggerMobileTest()" style="margin-left:10px;background:#a855f7">📱 Run Mobile Tests</button>
            </div>
          \`;
          break;
      }
    }

    async function loadOverview() {
      try {
        const res = await fetch(SYNTHIA_SERVER + '/admin/status');
        const data = await res.json();
        document.getElementById('deploy-count').textContent = data.deployments || 0;
        document.getElementById('model-count').textContent = data.models || 0;
        document.getElementById('fix-count').textContent = data.fixes || 0;
        document.getElementById('mobile-count').textContent = data.mobile || 0;
      } catch(e) {
        console.log('Server offline, using local data');
      }
      renderLogs(document.getElementById('activity-log'), 10);
    }

    function renderLogs(container, limit = 50) {
      container.innerHTML = logs.slice(-limit).map(l => 
        \`<div class="log-entry"><span class="time">\${l.time}</span><span class="tag \${l.tag}">\${l.tag}</span>\${l.msg}</div>\`
      ).join('');
    }

    function addLog(tag, msg) {
      logs.push({time: new Date().toLocaleTimeString(), tag, msg});
      const logEl = document.getElementById('activity-log') || document.getElementById('full-log');
      if (logEl) renderLogs(logEl);
    }

    async function triggerFullOrchestrate() {
      addLog('deploy', 'Triggering full orchestration...');
      await fetch(SYNTHIA_SERVER + '/agent/orchestrate', {method: 'POST'});
    }

    async function triggerMobileTest() {
      addLog('model', 'Starting mobile test suite...');
      await fetch(SYNTHIA_SERVER + '/agent/mobile-test', {method: 'POST'});
    }

    // Initialize
    renderTab('overview');
    setInterval(() => {
      fetch(SYNTHIA_SERVER + '/admin/status').catch(() => {});
    }, 30000);
  </script>
</body>
</html>\`
          };

          for (const item of missing) {
            if (scaffolds[item.file]) {
              const dir = path.dirname(item.file);
              if (!fs.existsSync(dir)) fs.mkdirSync(dir, {recursive: true});
              fs.writeFileSync(item.file, scaffolds[item.file]);
              fixes.push({type: 'scaffold', file: item.file, category: item.category});
            }
          }

          // Fix 2: Patch broken imports
          for (const issue of issues.filter(i => i.type === 'broken_import')) {
            if (fs.existsSync(issue.file)) {
              let content = fs.readFileSync(issue.file, 'utf8');
              // Try to find similar file
              const dir = path.dirname(issue.file);
              const base = path.basename(issue.module);
              const candidates = fs.readdirSync(dir).filter(f => f.includes(base.replace(/[^a-zA-Z]/g, '')));
              if (candidates.length > 0) {
                const replacement = './' + candidates[0].replace(/\.tsx?$/, '');
                content = content.replace(new RegExp(issue.module.replace(/[.*+?^${}()|[\]\]/g, '\\$&'), 'g'), replacement);
                fs.writeFileSync(issue.file, content);
                fixes.push({type: 'import_fix', file: issue.file, from: issue.module, to: replacement});
              }
            }
          }

          // Fix 3: Remove console.log from production files
          for (const issue of issues.filter(i => i.type === 'console_log')) {
            if (fs.existsSync(issue.file)) {
              let content = fs.readFileSync(issue.file, 'utf8');
              content = content.replace(/console\.log\([^)]*\);?
?/g, '');
              fs.writeFileSync(issue.file, content);
              fixes.push({type: 'console_cleanup', file: issue.file});
            }
          }

          fs.writeFileSync('fixes-applied.json', JSON.stringify(fixes, null, 2));
          console.log('Applied', fixes.length, 'fixes');
          console.log('::set-output name=fixes_applied::' + fixes.length);

          // Commit fixes
          if (fixes.length > 0) {
            const {execSync} = require('child_process');
            execSync('git config user.email "synthia-agent@autopoietic.dev"');
            execSync('git config user.name "Synthia Agent"');
            execSync('git add -A');
            execSync('git commit -m "[AUTO] Applied ' + fixes.length + ' fixes: ' + fixes.map(f => f.type).join(', ') + '"');
            execSync('git push');
          }
          "

      - name: 📤 Upload Fix Report
        uses: actions/upload-artifact@v4
        with:
          name: fix-report
          path: fixes-applied.json

  # ═══════════════════════════════════════════════════════
  # PHASE 3: DEPLOY
  # ═══════════════════════════════════════════════════════
  deploy:
    runs-on: ubuntu-latest
    needs: [ingest, fix]
    if: always() && (needs.ingest.result == 'success' || needs.fix.result == 'success')
    outputs:
      deploy_status: ${{ steps.deploy.outputs.deploy_status }}
    steps:
      - uses: actions/checkout@v4

      - name: 🌐 Deploy to Netlify (Website)
        id: deploy
        run: |
          npm install -g netlify-cli

          # Build if package.json exists
          if [ -f "package.json" ]; then
            npm ci
            npm run build 2>/dev/null || echo "No build script"
          fi

          # Deploy
          DEPLOY_URL=$(netlify deploy --prod --dir=dist --site=$NETLIFY_SITE_ID --auth=$NETLIFY_AUTH_TOKEN --json | jq -r '.deploy_url')
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "::set-output name=deploy_status::success"

          # Notify Synthia server
          curl -X POST $SYNTHIA_SERVER/agent/deploy             -H "Content-Type: application/json"             -d "{"platform":"netlify","url":"$DEPLOY_URL","commit":"$GITHUB_SHA","time":"$(date -Iseconds)"}"

      - name: 🚀 Deploy to Render (API)
        run: |
          curl -X POST https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys             -H "Authorization: Bearer $RENDER_API_KEY"             -H "Content-Type: application/json"             -d "{"clearCache":"do_not_clear"}"

          curl -X POST $SYNTHIA_SERVER/agent/deploy             -H "Content-Type: application/json"             -d "{"platform":"render","service":"$RENDER_SERVICE_ID","commit":"$GITHUB_SHA"}"

      - name: 🗄️ Sync Supabase Schema
        run: |
          if [ -f "supabase/migrations" ]; then
            for f in supabase/migrations/*.sql; do
              curl -X POST "$SUPABASE_URL/rest/v1/"                 -H "apikey: $SUPABASE_KEY"                 -H "Authorization: Bearer $SUPABASE_KEY"                 -d "@$f"
            done
          fi

  # ═══════════════════════════════════════════════════════
  # PHASE 4: MOBILE TEST (MCP)
  # ═══════════════════════════════════════════════════════
  mobile-test:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - name: 📱 Setup Mobile MCP
        run: |
          npm install -g @mobilenext/mobile-mcp
          npx @mobilenext/mobile-mcp@latest --help || true

      - name: 🔗 Connect to Mobile Device
        run: |
          # If using remote device via ADB over network
          if [ -n "$ANDROID_DEVICE_IP" ]; then
            adb connect $ANDROID_DEVICE_IP:5555
          fi

          # Or use emulator
          emulator -avd test_device -no-window -no-audio &
          sleep 30
          adb wait-for-device

      - name: 🧪 Install & Test App
        run: |
          node -e "
          const {execSync} = require('child_process');
          const fs = require('fs');

          const results = {
            install: false,
            launch: false,
            screenshot: null,
            ui_dump: null,
            tests: []
          };

          try {
            // Install APK if exists
            const apks = fs.readdirSync('.').filter(f => f.endsWith('.apk'));
            if (apks.length > 0) {
              execSync('adb install -r ' + apks[0]);
              results.install = true;
              results.tests.push({name: 'install', status: 'pass'});
            }

            // Launch app
            execSync('adb shell am start -n com.synthia.app/.MainActivity');
            results.launch = true;
            results.tests.push({name: 'launch', status: 'pass'});

            // Screenshot
            execSync('adb shell screencap -p /sdcard/screen.png');
            execSync('adb pull /sdcard/screen.png mobile-screenshot.png');
            results.screenshot = 'mobile-screenshot.png';

            // UI dump
            execSync('adb shell uiautomator dump /sdcard/ui.xml');
            execSync('adb pull /sdcard/ui.xml mobile-ui.xml');
            results.ui_dump = 'mobile-ui.xml';

            // Check for crashes
            const logcat = execSync('adb logcat -d -s AndroidRuntime:E').toString();
            if (logcat.includes('Exception')) {
              results.tests.push({name: 'crash_check', status: 'fail', log: logcat});
            } else {
              results.tests.push({name: 'crash_check', status: 'pass'});
            }

          } catch(e) {
            results.tests.push({name: 'overall', status: 'fail', error: e.message});
          }

          fs.writeFileSync('mobile-test-results.json', JSON.stringify(results, null, 2));
          console.log('Mobile test results:', JSON.stringify(results, null, 2));
          "

      - name: 📤 Upload Mobile Results
        uses: actions/upload-artifact@v4
        with:
          name: mobile-test-results
          path: |
            mobile-test-results.json
            mobile-screenshot.png
            mobile-ui.xml

      - name: 📢 Advertise Results
        run: |
          RESULTS=$(cat mobile-test-results.json)
          curl -X POST $SYNTHIA_SERVER/agent/mobile-results             -H "Content-Type: application/json"             -d "$RESULTS"

          # Post to admin webhook
          curl -X POST $ADMIN_WEBHOOK             -H "Content-Type: application/json"             -d "{"text":"📱 Mobile tests complete: $(echo $RESULTS | jq -r '.tests | map(select(.status=="pass")) | length')/$(echo $RESULTS | jq -r '.tests | length') passed"}"

  # ═══════════════════════════════════════════════════════
  # PHASE 5: MODEL DISPATCH
  # ═══════════════════════════════════════════════════════
  model-dispatch:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - name: 🤖 Dispatch Model Jobs
        run: |
          node -e "
          const fs = require('fs');

          const models = [
            {id: 'stellarproximology/synthiabot', task: 'inference', priority: 'high', endpoint: '/v1/chat'},
            {id: 'stellarproximology/trident-synthia', task: 'addressing', priority: 'high', endpoint: '/v1/address'},
            {id: 'stellarproximology/mrnn-morph', task: 'morphing', priority: 'medium', endpoint: '/v1/morph'},
            {id: 'stellarproximology/resonance-gan', task: 'generation', priority: 'medium', endpoint: '/v1/generate'}
          ];

          const jobs = [];

          for (const model of models) {
            // Check model health
            const health = await fetch('https://huggingface.co/api/models/' + model.id).then(r => r.ok).catch(() => false);

            const job = {
              model: model.id,
              task: model.task,
              status: health ? 'dispatched' : 'unavailable',
              assigned_at: new Date().toISOString(),
              endpoint: 'https://api-inference.huggingface.co/models/' + model.id + model.endpoint,
              callback: '$SYNTHIA_SERVER/agent/model-callback',
              payload: {
                repo: process.env.GITHUB_REPOSITORY,
                commit: process.env.GITHUB_SHA,
                deploy_url: '${{ needs.deploy.outputs.deploy_url }}'
              }
            };

            // Send to Synthia server for orchestration
            await fetch('$SYNTHIA_SERVER/agent/assign-model', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify(job)
            }).catch(e => console.log('Server callback failed:', e.message));

            jobs.push(job);
          }

          fs.writeFileSync('model-jobs.json', JSON.stringify(jobs, null, 2));
          console.log('Dispatched', jobs.filter(j => j.status === 'dispatched').length, 'model jobs');
          "

      - name: 📤 Upload Model Jobs
        uses: actions/upload-artifact@v4
        with:
          name: model-jobs
          path: model-jobs.json

      - name: 📢 Notify Admin
        run: |
          JOBS=$(cat model-jobs.json)
          curl -X POST $ADMIN_WEBHOOK             -H "Content-Type: application/json"             -d "{"text":"🤖 Model jobs dispatched: $(echo $JOBS | jq -r '.[] | select(.status=="dispatched") | .model' | wc -l) models active"}"

  # ═══════════════════════════════════════════════════════
  # PHASE 6: NOTIFY & UPDATE
  # ═══════════════════════════════════════════════════════
  notify:
    runs-on: ubuntu-latest
    needs: [deploy, mobile-test, model-dispatch]
    if: always()
    steps:
      - name: 📊 Generate Status Report
        run: |
          node -e "
          const report = {
            timestamp: new Date().toISOString(),
            run_id: process.env.GITHUB_RUN_ID,
            repo: process.env.GITHUB_REPOSITORY,
            commit: process.env.GITHUB_SHA,
            phases: {
              ingest: '${{ needs.ingest.result }}',
              fix: '${{ needs.fix.result }}',
              deploy: '${{ needs.deploy.result }}',
              mobile: '${{ needs.mobile-test.result }}',
              models: '${{ needs.model-dispatch.result }}'
            },
            summary: {
              deploy_url: '${{ needs.deploy.outputs.deploy_url }}',
              fixes_applied: '${{ needs.fix.outputs.fixes_applied }}',
              overall: '${{ needs.deploy.result }}' === 'success' ? 'healthy' : 'degraded'
            }
          };

          // Send to Synthia server
          fetch('$SYNTHIA_SERVER/agent/status-report', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(report)
          }).catch(() => {});

          // Send to admin
          fetch('$ADMIN_WEBHOOK', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
              text: \`🌌 Synthia Agent Report
              • Deploy: \${report.phases.deploy}
              • Mobile: \${report.phases.mobile}
              • Models: \${report.phases.models}
              • Fixes: \${report.summary.fixes_applied || 0}
              • URL: \${report.summary.deploy_url || 'N/A'}
              • Status: \${report.summary.overall}\`
            })
          }).catch(() => {});

          console.log('Status report sent');
          "
