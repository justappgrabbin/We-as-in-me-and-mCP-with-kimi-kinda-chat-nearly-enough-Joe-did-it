<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synthia Admin</title>
  <style>
    :root { --bg: #0a0a0f; --panel: #12121a; --accent: #00d4aa; --warn: #ff6b35; --text: #e0e0e0; --danger: #ff3366; --info: #4488ff; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
    .header { background: var(--panel); padding: 20px 30px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
    .header h1 { color: var(--accent); font-size: 26px; letter-spacing: -0.5px; }
    .header h1 span { color: var(--text); font-weight: 300; }
    .status { display: flex; gap: 12px; align-items: center; }
    .badge { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .badge.online { background: rgba(0,212,170,0.12); color: var(--accent); border: 1px solid rgba(0,212,170,0.3); }
    .badge.deploying { background: rgba(255,107,53,0.12); color: var(--warn); border: 1px solid rgba(255,107,53,0.3); }
    .badge.offline { background: rgba(255,51,102,0.12); color: var(--danger); border: 1px solid rgba(255,51,102,0.3); }
    .pulse { width: 8px; height: 8px; border-radius: 50%; background: currentColor; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .grid { display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 70px); }
    .sidebar { background: var(--panel); border-right: 1px solid #222; padding: 20px; }
    .nav-item { padding: 12px 16px; border-radius: 10px; cursor: pointer; margin-bottom: 4px; transition: all 0.2s; display: flex; align-items: center; gap: 10px; font-size: 14px; color: #888; }
    .nav-item:hover { background: rgba(0,212,170,0.06); color: var(--text); }
    .nav-item.active { background: rgba(0,212,170,0.1); color: var(--accent); font-weight: 500; }
    .nav-icon { width: 20px; text-align: center; }
    .main { padding: 28px; overflow-y: auto; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-bottom: 28px; }
    .card { background: var(--panel); border-radius: 14px; padding: 24px; border: 1px solid #222; transition: border-color 0.3s; }
    .card:hover { border-color: #333; }
    .card h3 { color: var(--accent); margin-bottom: 16px; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; }
    .metric { font-size: 36px; font-weight: 700; margin: 8px 0; color: var(--text); }
    .metric.small { font-size: 20px; }
    .metric-label { font-size: 13px; color: #666; margin-top: 4px; }
    .card-row { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; padding-top: 16px; border-top: 1px solid #222; }
    .trend { font-size: 12px; padding: 4px 10px; border-radius: 6px; }
    .trend.up { background: rgba(0,212,170,0.1); color: var(--accent); }
    .trend.down { background: rgba(255,51,102,0.1); color: var(--danger); }
    .log-container { background: #0d0d14; border-radius: 12px; padding: 20px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; max-height: 500px; overflow-y: auto; border: 1px solid #222; }
    .log-entry { padding: 8px 0; border-bottom: 1px solid #1a1a2e; display: flex; gap: 12px; align-items: flex-start; }
    .log-entry:last-child { border-bottom: none; }
    .log-time { color: #555; font-size: 11px; min-width: 80px; flex-shrink: 0; }
    .log-tag { padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; flex-shrink: 0; }
    .tag.deploy { background: rgba(0,212,170,0.15); color: var(--accent); }
    .tag.fix { background: rgba(255,107,53,0.15); color: var(--warn); }
    .tag.model { background: rgba(138,43,226,0.15); color: #a855f7; }
    .tag.mobile { background: rgba(68,136,255,0.15); color: var(--info); }
    .tag.error { background: rgba(255,51,102,0.15); color: var(--danger); }
    .tag.scan { background: rgba(136,136,136,0.15); color: #888; }
    .tag.orchestrate { background: rgba(0,212,170,0.1); color: var(--accent); }
    .log-msg { color: #bbb; line-height: 1.5; }
    .btn { background: var(--accent); color: #000; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 14px; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,212,170,0.3); }
    .btn.secondary { background: #1a1a2e; color: var(--text); border: 1px solid #333; }
    .btn.secondary:hover { background: #222; box-shadow: none; }
    .btn.purple { background: #a855f7; color: #fff; }
    .btn.purple:hover { box-shadow: 0 4px 20px rgba(168,85,247,0.3); }
    .btn.danger { background: var(--danger); color: #fff; }
    .model-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .model-card { background: var(--panel); border-radius: 12px; padding: 20px; border: 1px solid #222; transition: all 0.2s; }
    .model-card:hover { border-color: var(--accent); }
    .model-card .name { font-weight: 600; margin-bottom: 8px; font-size: 15px; }
    .model-card .id { font-size: 11px; color: #666; font-family: monospace; margin-bottom: 12px; }
    .model-card .status { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .status-dot.active { background: var(--accent); }
    .status-dot.inactive { background: #555; }
    .status-dot.error { background: var(--danger); }
    .deploy-list { display: flex; flex-direction: column; gap: 12px; }
    .deploy-item { background: var(--panel); border-radius: 10px; padding: 16px; border: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
    .deploy-item .platform { font-weight: 600; font-size: 14px; }
    .deploy-item .url { font-size: 12px; color: var(--info); font-family: monospace; }
    .deploy-item .time { font-size: 11px; color: #666; }
    .section-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: var(--text); }
    .action-bar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
    .setting-item { background: var(--panel); border-radius: 10px; padding: 20px; border: 1px solid #222; }
    .setting-item h4 { font-size: 14px; margin-bottom: 8px; color: var(--accent); }
    .setting-item p { font-size: 13px; color: #888; font-family: monospace; word-break: break-all; }
    .toggle { display: flex; align-items: center; gap: 12px; cursor: pointer; }
    .toggle-switch { width: 44px; height: 24px; background: #333; border-radius: 12px; position: relative; transition: 0.3s; }
    .toggle-switch.on { background: var(--accent); }
    .toggle-switch::after { content: ''; position: absolute; width: 20px; height: 20px; background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: 0.3s; }
    .toggle-switch.on::after { left: 22px; }
    .hidden { display: none !important; }
    .mobile-preview { background: var(--panel); border-radius: 14px; padding: 20px; border: 1px solid #222; text-align: center; }
    .mobile-preview img { max-width: 300px; border-radius: 8px; border: 1px solid #333; }
    .mobile-preview .placeholder { padding: 60px 20px; color: #555; }
    .refresh-btn { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; border-radius: 50%; background: var(--accent); color: #000; border: none; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(0,212,170,0.3); transition: 0.2s; z-index: 1000; }
    .refresh-btn:hover { transform: scale(1.1); }
    .refresh-btn.spinning { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 60px 20px; color: #555; }
    .empty-state svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.3; }
    .fix-queue { display: flex; flex-direction: column; gap: 10px; }
    .fix-item { background: var(--panel); border-radius: 10px; padding: 16px; border: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
    .fix-item .type { font-size: 12px; padding: 4px 10px; border-radius: 6px; background: rgba(255,107,53,0.1); color: var(--warn); }
    .fix-item .file { font-family: monospace; font-size: 13px; color: #aaa; }
    .fix-item .status { font-size: 12px; color: var(--accent); }
  </style>
</head>
<body>
  <div class="header">
    <h1>🌌 <span>Synthia</span> Agent</h1>
    <div class="status">
      <span class="badge online" id="server-badge"><span class="pulse"></span> Server Online</span>
      <span class="badge deploying" id="deploy-badge">Deploying</span>
    </div>
  </div>

  <div class="grid">
    <div class="sidebar">
      <div class="nav-item active" onclick="showTab('overview')">
        <span class="nav-icon">📊</span> Overview
      </div>
      <div class="nav-item" onclick="showTab('deployments')">
        <span class="nav-icon">🚀</span> Deployments
      </div>
      <div class="nav-item" onclick="showTab('models')">
        <span class="nav-icon">🤖</span> Model Jobs
      </div>
      <div class="nav-item" onclick="showTab('mobile')">
        <span class="nav-icon">📱</span> Mobile Tests
      </div>
      <div class="nav-item" onclick="showTab('code')">
        <span class="nav-icon">🔧</span> Code Fixes
      </div>
      <div class="nav-item" onclick="showTab('logs')">
        <span class="nav-icon">📋</span> System Logs
      </div>
      <div class="nav-item" onclick="showTab('settings')">
        <span class="nav-icon">⚙️</span> Settings
      </div>
    </div>

    <div class="main" id="main-content"></div>
  </div>

  <button class="refresh-btn" id="refresh-btn" onclick="refreshAll()" title="Refresh all data">↻</button>

  <script>
    const SYNTHIA_SERVER = localStorage.getItem('synthia-server') || 'https://synthia-server.onrender.com';
    const HF_API = 'https://huggingface.co/api/models/stellarproximology';
    let logs = [];
    let models = [];
    let deployments = [];
    let fixes = [];
    let currentTab = 'overview';

    function showTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      event.currentTarget.classList.add('active');
      renderTab(tab);
    }

    function renderTab(tab) {
      const main = document.getElementById('main-content');
      switch(tab) {
        case 'overview':
          main.innerHTML = `
            <div class="cards">
              <div class="card">
                <h3>Active Deployments</h3>
                <div class="metric" id="deploy-count">0</div>
                <div class="metric-label">Platforms deployed</div>
                <div class="card-row">
                  <span class="trend up">↑ Live</span>
                  <span style="font-size:12px;color:#666">Last: <span id="last-deploy">Never</span></span>
                </div>
              </div>
              <div class="card">
                <h3>Model Jobs</h3>
                <div class="metric" id="model-count">0</div>
                <div class="metric-label">Active inference jobs</div>
                <div class="card-row">
                  <span class="trend up" id="model-trend">↑ Healthy</span>
                  <span style="font-size:12px;color:#666">HF Org: stellarproximology</span>
                </div>
              </div>
              <div class="card">
                <h3>Code Fixes</h3>
                <div class="metric" id="fix-count">0</div>
                <div class="metric-label">Auto-fixes applied today</div>
                <div class="card-row">
                  <span class="trend up" id="fix-trend">↑ Clean</span>
                  <span style="font-size:12px;color:#666">Last scan: <span id="last-scan">Never</span></span>
                </div>
              </div>
              <div class="card">
                <h3>Mobile Tests</h3>
                <div class="metric" id="mobile-count">0</div>
                <div class="metric-label">Tests passed today</div>
                <div class="card-row">
                  <span class="trend" id="mobile-trend">— Pending</span>
                  <span style="font-size:12px;color:#666">Device: <span id="device-status">Unknown</span></span>
                </div>
              </div>
            </div>
            <div class="card">
              <h3>Recent Activity</h3>
              <div class="log-container" id="activity-log">
                <div class="empty-state">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                  <p>Waiting for agent activity...</p>
                </div>
              </div>
            </div>
          `;
          loadOverview();
          break;

        case 'deployments':
          main.innerHTML = `
            <div class="action-bar">
              <button class="btn" onclick="triggerDeploy()">🚀 Deploy All</button>
              <button class="btn secondary" onclick="checkDeployStatus()">↻ Check Status</button>
            </div>
            <div class="section-title">Deployment Pipeline</div>
            <div class="deploy-list" id="deploy-list">
              <div class="empty-state">
                <p>No deployments yet. Trigger one above.</p>
              </div>
            </div>
          `;
          loadDeployments();
          break;

        case 'models':
          main.innerHTML = `
            <div class="action-bar">
              <button class="btn purple" onclick="dispatchModels()">🤖 Dispatch All Models</button>
              <button class="btn secondary" onclick="checkModelHealth()">↻ Check Health</button>
            </div>
            <div class="section-title">Model Job Registry</div>
            <div class="model-grid" id="model-grid">
              <div class="empty-state">
                <p>No model jobs dispatched yet.</p>
              </div>
            </div>
          `;
          loadModels();
          break;

        case 'mobile':
          main.innerHTML = `
            <div class="action-bar">
              <button class="btn" onclick="runMobileTest()">📱 Run Mobile Tests</button>
              <button class="btn secondary" onclick="connectDevice()">🔗 Connect Device</button>
            </div>
            <div class="section-title">Mobile Device Farm</div>
            <div class="mobile-preview" id="mobile-preview">
              <div class="placeholder">
                <p>Connect a device and run tests to see screenshots here</p>
              </div>
            </div>
            <div style="margin-top:20px">
              <div class="section-title">Test Results</div>
              <div class="log-container" id="mobile-results"></div>
            </div>
          `;
          loadMobile();
          break;

        case 'code':
          main.innerHTML = `
            <div class="action-bar">
              <button class="btn" onclick="runScan()">🔍 Scan Repo</button>
              <button class="btn secondary" onclick="runFix()">🔧 Auto-Fix</button>
            </div>
            <div class="section-title">Auto-Fix Queue</div>
            <div class="fix-queue" id="fix-queue">
              <div class="empty-state">
                <p>No fixes queued. Run a scan to detect issues.</p>
              </div>
            </div>
          `;
          loadFixes();
          break;

        case 'logs':
          main.innerHTML = `
            <div class="action-bar">
              <button class="btn secondary" onclick="clearLogs()">🗑️ Clear</button>
              <button class="btn secondary" onclick="exportLogs()">📥 Export</button>
            </div>
            <div class="section-title">System Logs</div>
            <div class="log-container" id="full-log">
              <div class="empty-state">
                <p>No logs yet. Agent activity will appear here.</p>
              </div>
            </div>
          `;
          loadLogs();
          break;

        case 'settings':
          main.innerHTML = `
            <div class="section-title">Agent Configuration</div>
            <div class="settings-grid">
              <div class="setting-item">
                <h4>🌐 Synthia Server</h4>
                <p>${SYNTHIA_SERVER}</p>
                <div style="margin-top:12px">
                  <input type="text" id="server-input" value="${SYNTHIA_SERVER}" style="width:100%;padding:8px 12px;background:#0a0a0f;border:1px solid #333;border-radius:6px;color:#aaa;font-family:monospace;font-size:13px">
                  <button class="btn" style="margin-top:8px;font-size:12px;padding:8px 16px" onclick="saveServer()">Save</button>
                </div>
              </div>
              <div class="setting-item">
                <h4>🤗 HuggingFace Org</h4>
                <p>stellarproximology</p>
              </div>
              <div class="setting-item">
                <h4>🔧 Auto-Fix</h4>
                <div class="toggle" onclick="toggleAutoFix()">
                  <div class="toggle-switch on" id="autofix-toggle"></div>
                  <span style="font-size:13px;color:#888">Enabled</span>
                </div>
              </div>
              <div class="setting-item">
                <h4>📱 Mobile MCP</h4>
                <div class="toggle" onclick="toggleMobileMCP()">
                  <div class="toggle-switch on" id="mobile-toggle"></div>
                  <span style="font-size:13px;color:#888">Enabled</span>
                </div>
              </div>
              <div class="setting-item">
                <h4>📊 Check Interval</h4>
                <p>15 minutes (900000ms)</p>
              </div>
              <div class="setting-item">
                <h4>📦 Repo</h4>
                <p>${location.pathname.split('/')[1] || 'unknown'}</p>
              </div>
            </div>
            <div style="margin-top:24px">
              <button class="btn" onclick="triggerFullOrchestrate()">🚀 Trigger Full Orchestrate</button>
              <button class="btn purple" onclick="triggerMobileTest()" style="margin-left:10px">📱 Run Mobile Tests</button>
              <button class="btn danger" onclick="resetAgent()" style="margin-left:10px">⚠️ Reset Agent</button>
            </div>
          `;
          break;
      }
    }

    async function loadOverview() {
      try {
        const res = await fetch(SYNTHIA_SERVER + '/admin/status');
        if (res.ok) {
          const data = await res.json();
          document.getElementById('deploy-count').textContent = data.deployments || 0;
          document.getElementById('model-count').textContent = data.models || 0;
          document.getElementById('fix-count').textContent = data.fixes || 0;
          document.getElementById('mobile-count').textContent = data.mobile || 0;
          if (data.lastDeploy) document.getElementById('last-deploy').textContent = new Date(data.lastDeploy).toLocaleTimeString();
          if (data.lastScan) document.getElementById('last-scan').textContent = new Date(data.lastScan).toLocaleTimeString();
        }
      } catch(e) {
        document.getElementById('server-badge').className = 'badge offline';
        document.getElementById('server-badge').innerHTML = '<span class="pulse"></span> Server Offline';
      }
      renderLogs(document.getElementById('activity-log'), 15);
    }

    function renderLogs(container, limit = 50) {
      if (!container) return;
      if (logs.length === 0) return;
      container.innerHTML = logs.slice(-limit).map(l => 
        `<div class="log-entry">
          <span class="log-time">${new Date(l.time).toLocaleTimeString()}</span>
          <span class="log-tag tag ${l.tag}">${l.tag}</span>
          <span class="log-msg">${escapeHtml(l.msg)}</span>
        </div>`
      ).join('');
      container.scrollTop = container.scrollHeight;
    }

    function addLog(tag, msg, data) {
      const entry = {time: new Date().toISOString(), tag, msg, data};
      logs.push(entry);
      if (logs.length > 1000) logs = logs.slice(-1000);

      const containers = [
        document.getElementById('activity-log'),
        document.getElementById('full-log')
      ];
      containers.forEach(c => { if (c) renderLogs(c); });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function triggerFullOrchestrate() {
      addLog('orchestrate', 'Triggering full orchestration...');
      try {
        await fetch(SYNTHIA_SERVER + '/agent/orchestrate', {method: 'POST'});
        addLog('orchestrate', 'Orchestration triggered successfully');
      } catch(e) {
        addLog('error', 'Failed to trigger orchestration: ' + e.message);
      }
    }

    async function triggerDeploy() {
      addLog('deploy', 'Triggering deployment...');
      try {
        await fetch(SYNTHIA_SERVER + '/agent/deploy', {method: 'POST'});
        addLog('deploy', 'Deploy triggered');
      } catch(e) {
        addLog('error', 'Deploy failed: ' + e.message);
      }
    }

    async function dispatchModels() {
      addLog('model', 'Dispatching model jobs...');
      try {
        await fetch(SYNTHIA_SERVER + '/agent/assign-model', {method: 'POST'});
        addLog('model', 'Models dispatched');
      } catch(e) {
        addLog('error', 'Model dispatch failed: ' + e.message);
      }
    }

    async function runMobileTest() {
      addLog('mobile', 'Starting mobile test suite...');
      try {
        await fetch(SYNTHIA_SERVER + '/agent/mobile-test', {method: 'POST'});
        addLog('mobile', 'Mobile tests started');
      } catch(e) {
        addLog('error', 'Mobile test failed: ' + e.message);
      }
    }

    async function runScan() {
      addLog('scan', 'Scanning repository...');
      try {
        await fetch(SYNTHIA_SERVER + '/agent/scan', {method: 'POST'});
        addLog('scan', 'Scan complete');
      } catch(e) {
        addLog('error', 'Scan failed: ' + e.message);
      }
    }

    async function runFix() {
      addLog('fix', 'Running auto-fix...');
      try {
        await fetch(SYNTHIA_SERVER + '/agent/fix', {method: 'POST'});
        addLog('fix', 'Auto-fix complete');
      } catch(e) {
        addLog('error', 'Fix failed: ' + e.message);
      }
    }

    async function refreshAll() {
      const btn = document.getElementById('refresh-btn');
      btn.classList.add('spinning');

      if (currentTab === 'overview') await loadOverview();
      if (currentTab === 'deployments') await loadDeployments();
      if (currentTab === 'models') await loadModels();
      if (currentTab === 'mobile') await loadMobile();
      if (currentTab === 'code') await loadFixes();
      if (currentTab === 'logs') loadLogs();

      setTimeout(() => btn.classList.remove('spinning'), 1000);
    }

    function loadDeployments() {
      const list = document.getElementById('deploy-list');
      if (!list) return;
      if (deployments.length === 0) return;
      list.innerHTML = deployments.map(d => `
        <div class="deploy-item">
          <div>
            <div class="platform">${d.platform}</div>
            <div class="url">${d.url || 'N/A'}</div>
          </div>
          <div class="time">${new Date(d.time).toLocaleString()}</div>
        </div>
      `).join('');
    }

    function loadModels() {
      const grid = document.getElementById('model-grid');
      if (!grid) return;
      if (models.length === 0) return;
      grid.innerHTML = models.map(m => `
        <div class="model-card">
          <div class="name">${m.name || m.model.split('/').pop()}</div>
          <div class="id">${m.model}</div>
          <div class="status">
            <span class="status-dot ${m.status === 'dispatched' || m.status === 'running' ? 'active' : m.status === 'failed' ? 'error' : 'inactive'}"></span>
            ${m.status}
          </div>
        </div>
      `).join('');
    }

    function loadMobile() {
      // Load mobile test results if available
    }

    function loadFixes() {
      const queue = document.getElementById('fix-queue');
      if (!queue) return;
      if (fixes.length === 0) return;
      queue.innerHTML = fixes.map(f => `
        <div class="fix-item">
          <div>
            <span class="type">${f.type}</span>
            <span class="file">${f.file}</span>
          </div>
          <span class="status">${f.committed ? '✅ Committed' : '⏳ Pending'}</span>
        </div>
      `).join('');
    }

    function loadLogs() {
      renderLogs(document.getElementById('full-log'), 100);
    }

    function clearLogs() {
      logs = [];
      loadLogs();
      addLog('scan', 'Logs cleared');
    }

    function exportLogs() {
      const blob = new Blob([JSON.stringify(logs, null, 2)], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `synthia-logs-${Date.now()}.json`;
      a.click();
    }

    function saveServer() {
      const input = document.getElementById('server-input');
      if (input) {
        localStorage.setItem('synthia-server', input.value);
        addLog('scan', 'Server URL saved');
      }
    }

    function toggleAutoFix() {
      const toggle = document.getElementById('autofix-toggle');
      toggle.classList.toggle('on');
      addLog('scan', 'Auto-fix ' + (toggle.classList.contains('on') ? 'enabled' : 'disabled'));
    }

    function toggleMobileMCP() {
      const toggle = document.getElementById('mobile-toggle');
      toggle.classList.toggle('on');
      addLog('mobile', 'Mobile MCP ' + (toggle.classList.contains('on') ? 'enabled' : 'disabled'));
    }

    function resetAgent() {
      if (confirm('Reset agent state? This will clear all logs and cached data.')) {
        logs = [];
        models = [];
        deployments = [];
        fixes = [];
        addLog('scan', 'Agent reset complete');
        renderTab(currentTab);
      }
    }

    function connectDevice() {
      addLog('mobile', 'Attempting ADB connection...');
    }

    function checkDeployStatus() {
      addLog('deploy', 'Checking deployment status...');
    }

    function checkModelHealth() {
      addLog('model', 'Checking model health...');
    }

    // Simulate some initial data
    addLog('orchestrate', 'Synthia Agent initialized');
    addLog('scan', 'Repository scanner ready');
    addLog('deploy', 'Deployment pipeline ready');
    addLog('model', 'Model dispatcher ready');
    addLog('mobile', 'Mobile MCP bridge ready');

    // Initialize
    renderTab('overview');

    // Auto-refresh every 30s
    setInterval(() => {
      if (currentTab === 'overview') loadOverview();
    }, 30000);
  </script>
</body>
</html>
